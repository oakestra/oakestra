name: Python Codestyle Check (ruff)

on: pull_request

jobs:
  style-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run Ruff formating check
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check
      - name: Run Ruff linting check
        uses: astral-sh/ruff-action@v3
        with:
          args: check
