
x-logging:
  &default-logging
  driver: "json-file"
  options:
    max-size: "1m"
    max-file: "1"
    tag: "{{.Name}}"

services:

  # MQTT 
  mqtt:
    image: eclipse-mosquitto:2.0
    hostname: mqtt
    container_name: mqtt
    expose:
      - "${MQTT_BROKER_PORT}"
    ports:
      - "${MQTT_BROKER_PORT}:${MQTT_BROKER_PORT}"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - /mosquitto/data
      - /mosquitto/log
    healthcheck:
      test: [ "CMD-SHELL", "timeout -t 5 mosquitto_sub -t '$$SYS/#' -C 1 | grep -v Error || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 6

      
  # cluster-level mongoDB
  mongo_cluster:
    image: mongo:8.0
    container_name: cluster_mongo
    hostname: cluster_mongo
    ports:
      - "${MONGODB_PORT}:${MONGODB_PORT}"
    volumes:
      - 'mongodb_cluster_data:/mongodb'
    command: mongod --port ${MONGODB_PORT}

  # cluster-level mongoDB
  mongo_clusternet:
    image: mongo:8.0
    container_name: cluster_mongo_net
    hostname: cluster_mongo_net
    ports:
      - "${MONGODB_NET_PORT}:${MONGODB_NET_PORT}"
    volumes:
      - 'mongodb_cluster_net_data:/mongodb'
    command: mongod --port ${MONGODB_NET_PORT}


  # Cluster Manager
  cluster_service_manager:
    image: ghcr.io/oakestra/oakestra-net/cluster-service-manager:latest
    container_name: cluster_service_manager
    labels:
      logging: "cluster_promtail"
      logging_jobname: "containerlogs"
    hostname: cluster_service_manager
    expose:
      - "${SERVICE_MANAGER_PORT}"
    ports:
      - "${SERVICE_MANAGER_PORT}:${SERVICE_MANAGER_PORT}"
    environment:
      - MY_PORT=${SERVICE_MANAGER_PORT}
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT}
      - MQTT_BROKER_URL=mqtt
      - ROOT_SERVICE_MANAGER_URL=${ROOT_SERVICE_MANAGER_URL}
      - ROOT_SERVICE_MANAGER_PORT=${ROOT_SERVICE_MANAGER_PORT}
      - SYSTEM_MANAGER_URL=${SYSTEM_MANAGER_URL}
      - SYSTEM_MANAGER_PORT=${SYSTEM_MANAGER_PORT}
      - CLUSTER_MONGO_URL=cluster_mongo_net
      - CLUSTER_MONGO_PORT=${MONGODB_NET_PORT}
      - ROUTING_MANAGER_URL=${ROUTING_MANAGER_HOST}
      - ROUTING_MANAGER_PORT=${ROUTING_MANAGER_HTTP_SERVER_PORT}
    depends_on:
      - mongo_clusternet
      - mqtt
    logging: *default-logging

  # Cluster Manager
  cluster_manager:
    image: cluster_manager
    build: cluster-manager/
    container_name: cluster_manager
    labels:
      logging: "cluster_promtail"
      logging_jobname: "containerlogs"
    hostname: cluster_manager
    expose:
      - "${CLUSTER_MANAGER_PORT}"
      - "10101"
    ports:
      - "${CLUSTER_MANAGER_PORT}:${CLUSTER_MANAGER_PORT}"
      - "10101:10101"
    environment:
      - MY_PORT=${CLUSTER_MANAGER_PORT}
      - SYSTEM_MANAGER_URL=${SYSTEM_MANAGER_URL}
      - SYSTEM_MANAGER_PORT=${SYSTEM_MANAGER_PORT}
      - CLUSTER_SERVICE_MANAGER_ADDR=cluster_service_manager
      - CLUSTER_SERVICE_MANAGER_PORT=${SERVICE_MANAGER_PORT}
      - CLUSTER_MONGO_URL=cluster_mongo
      - CLUSTER_MONGO_PORT=${MONGODB_PORT}
      - CLUSTER_SCHEDULER_URL=cluster_scheduler
      - CLUSTER_SCHEDULER_PORT=${SCHEDULER_PORT}
      - MQTT_BROKER_URL=mqtt
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT}
      - CLUSTER_NAME=${CLUSTER_NAME}
      - CLUSTER_LOCATION=${CLUSTER_LOCATION}
    depends_on:
      - mongo_cluster
      - mqtt
      - cluster_scheduler
      - cluster_service_manager
    logging: *default-logging



  # Cluster Scheduler
  cluster_scheduler:
    image: cluster_scheduler
    build: cluster-scheduler/
    container_name: cluster_scheduler
    labels:
      logging: "cluster_promtail"
      logging_jobname: "containerlogs"
    hostname: cluster_scheduler
    expose:
      - "${SCHEDULER_PORT}"
    ports:
      - "${SCHEDULER_PORT}:${SCHEDULER_PORT}"
    environment:
      - MY_PORT=${SCHEDULER_PORT}
      - CLUSTER_MANAGER_URL=cluster_manager
      - CLUSTER_MANAGER_PORT=${CLUSTER_MANAGER_PORT}
      - CLUSTER_MONGO_URL=cluster_mongo
      - CLUSTER_MONGO_PORT=${MONGODB_PORT}
      - REDIS_ADDR=redis://:${REDIS_PASSWORD}@cluster_redis:${REDIS_PORT}
    depends_on:
      - cluster_redis
      - mongo_cluster
    logging: *default-logging


  # Redis for the Cluster Scheduler as Job Queue
  cluster_redis:
    image: redis
    hostname: cluster_redis
    container_name: cluster_redis
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    command: redis-server --requirepass ${REDIS_PASSWORD} --port ${REDIS_PORT}


  prometheus:
    image: prom/prometheus
    container_name: prometheus
    hostname: prometheus
    ports:
      - 10009:9090
    volumes:
      - ./prometheus/:/etc/prometheus/
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - cluster_manager


  # Observability stack (Grafana, Loki, Promtail)
  cluster_grafana:
    image: grafana/grafana
    hostname: cluster_grafana
    container_name: cluster_grafana
    ports:
      - 3001:3000
    volumes:
      - ./config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./config/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./config/dashboards:/var/lib/grafana/dashboards
    logging: *default-logging

  cluster_loki:
    container_name: cluster_loki
    image: grafana/loki:2.9.2
    ports:
      - 3101:3100
    volumes:
      - ./config/loki.yml:/etc/loki/config.yml
      - ./config/alerts/rules.yml:/etc/loki/rules/fake/rules.yml

    command: -config.file=/etc/loki/config.yml
    logging: *default-logging
    
  cluster_promtail:
    image: grafana/promtail:2.9.2
    container_name: cluster_promtail
    volumes:
      - ./config/promtail.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: 
      - '--config.file=/etc/promtail/config.yml'
      - '--server.enable-runtime-reload'
    depends_on:
      - cluster_loki
    logging: *default-logging


volumes:
  mongodb_cluster_data:
    driver: local
  mongodb_cluster_net_data:
    driver: local
