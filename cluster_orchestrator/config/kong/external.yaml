_format_version: "3.0"

services:
  # Public cluster-manager API surface.
  - name: cluster_manager_public
    url: http://cluster_manager:10100
    routes:
      - name: cm-cluster-status
        paths:
          - /api/cluster/status
        methods: [GET, OPTIONS]
        strip_path: false

      - name: cm-node-register
        paths:
          - /api/node/register
        methods: [POST, OPTIONS]
        strip_path: false

      - name: cm-service-instance
        paths:
          - "~/^/api/service/[^/]+/[^/]+$"
        methods: [POST, DELETE, OPTIONS]
        strip_path: false

      - name: cm-result-deploy
        paths:
          - /api/result/deploy
        methods: [POST, OPTIONS]
        strip_path: false

      - name: cm-docs-public
        paths:
          - /api/docs
          - /docs
          - /docs/
          - /docs/openapi.json
        methods: [GET, OPTIONS]
        strip_path: false

  # Fallback deny: any API path not matched by explicit allowlist stays blocked.
  - name: cluster_manager_api_block
    url: http://cluster_manager:10100
    routes:
      - name: cm-block-api-fallback
        paths:
          - /api
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        strip_path: false
    plugins:
      - name: request-termination
        config:
          status_code: 403
          message: "Endpoint not exposed on the external cluster gateway"

  # Explicitly block addons manager service on the external gateway.
  - name: cluster_addons_manager_block
    url: http://cluster_addons_manager:11201
    routes:
      - name: cm-block-addons-manager
        paths:
          - /api/v1/addons
          - /api/v1/addons/
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        strip_path: false
    plugins:
      - name: request-termination
        config:
          status_code: 403
          message: "Addons manager is not exposed on the external cluster gateway"

  # Explicitly block addons dashboard service on the external gateway.
  - name: cluster_addons_dashboard_block
    url: http://cluster_addons_dashboard:11203
    routes:
      - name: cm-block-addons-dashboard
        paths:
          - /cluster-addons-dashboard
          - /cluster-addons-dashboard/
        methods: [GET, POST, PUT, PATCH, DELETE, OPTIONS]
        strip_path: false
    plugins:
      - name: request-termination
        config:
          status_code: 403
          message: "Addons dashboard is not exposed on the external cluster gateway"

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Authorization
        - Content-Type
        - Accept
      exposed_headers:
        - Authorization
      credentials: false
      max_age: 3600
